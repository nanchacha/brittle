<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>주문 관리 - 춘천 할미</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com" rel="preconnect">
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect">
    <!-- 큰 글씨체를 위해 시인성 좋은 폰트 위주로 설정 -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #f3f4f6;
        }
        .tab-btn.active {
            border-bottom: 4px solid #885210;
            color: #885210;
            font-weight: 700;
        }
    </style>
</head>
<body class="text-gray-900 antialiased">

<nav class="w-full sticky top-0 z-50 bg-white shadow-md">
    <div class="max-w-7xl mx-auto px-6 flex justify-between items-center h-24">
        <div class="flex items-center gap-3">
            <span class="text-4xl font-bold text-[#885210]">춘천 할미 사장님 전용 관리페이지</span>
        </div>
        <a href="index.html" class="text-xl text-gray-500 hover:text-gray-800 underline">쇼핑몰로 돌아가기</a>
    </div>
</nav>

<main class="max-w-7xl mx-auto px-6 py-12">
    
    <!-- 탭 메뉴 -->
    <div class="flex border-b-2 border-gray-300 mb-10">
        <button id="tab-pending" class="tab-btn active text-3xl pb-4 px-8 text-gray-500 transition-colors">
            새로 들어온 주문 (<span id="count-pending" class="text-[#885210]">0</span>건)
        </button>
        <button id="tab-shipped" class="tab-btn text-3xl pb-4 px-8 text-gray-500 transition-colors">
            발송 완료한 주문 (<span id="count-shipped">0</span>건)
        </button>
    </div>

    <!-- 로딩 표시 -->
    <div id="loading" class="text-center py-20 text-3xl text-gray-500">
        주문 정보를 불러오고 있습니다...
    </div>

    <!-- 주문 목록 영역 -->
    <div id="orders-container" class="space-y-8 hidden">
        <!-- JS로 카드가 추가됩니다. -->
    </div>

</main>

<script type="module" src="admin.js"></script>
</body>
</html>
