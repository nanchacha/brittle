<style>
        @keyframes subtleFloat {

        }

        .pulse-effect::after {

<script>
    const toggleBtn = document.getElementById('antigravity-toggle');
    const elements = document.querySelectorAll('.physics-element');
    let isAntigravity = false;
    let floatInterval;

    function applyPhysics() {
        elements.forEach((el, index) => {
            if (isAntigravity) {
                const rx = (Math.random() - 0.5) * 60;
                const ry = (Math.random() - 0.5) * 80 - 40;
                const rotate = (Math.random() - 0.5) * 15;
                const scale = 1 + (Math.random() * 0.05);
                el.style.transform = `translate(${rx}px, ${ry}px) rotate(${rotate}deg) scale(${scale})`;
            } else {
                el.style.transform = `translate(0, 0) rotate(0) scale(1)`;
            }
        });
    }

    function toggleAntigravity() {
        isAntigravity = !isAntigravity;
        document.body.classList.toggle('antigravity-active', isAntigravity);
        if (isAntigravity) {
            toggleBtn.innerHTML = '<span class="material-symbols-outlined text-[20px]" style="font-variation-settings: \'FILL\' 1;">auto_mode</span>';
            toggleBtn.classList.remove('pulse-effect');
            applyPhysics();
            floatInterval = setInterval(applyPhysics, 3000);
        } else {
            toggleBtn.innerHTML = '<span class="material-symbols-outlined text-[20px]" style="font-variation-settings: \'FILL\' 0;">rocket_launch</span>';
            toggleBtn.classList.add('pulse-effect');
            clearInterval(floatInterval);
            applyPhysics();
        }
    }

    if(toggleBtn) {
        toggleBtn.addEventListener('click', toggleAntigravity);
    }

    setTimeout(() => {
        if(!isAntigravity) {
            console.log("Antigravity ready.");
        }
    }, 2000);

    elements.forEach(el => {
        el.addEventListener('mouseenter', () => {
            if (isAntigravity) {
                const currentTransform = getComputedStyle(el).transform;
                el.style.transform += ' scale(1.1) translateY(-20px)';
            }
        });
        el.addEventListener('mouseleave', () => {
            if (isAntigravity) applyPhysics();
        });
    });
</script>
